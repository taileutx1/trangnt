<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập - TAILIEUTX1</title>

  <!-- Tailwind CSS via CDN (dùng cho dev, production nên build bằng CLI) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#ec4899',
            accent: '#f472b6',
            danger: '#dc2626'
          }
        }
      }
    }
  </script>
</head>

<body class="bg-gradient-to-br from-pink-50 to-purple-50 min-h-screen flex items-center justify-center px-4">
  <!-- Card đăng nhập -->
  <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden">
    <!-- Header -->
    <div class="bg-gradient-to-r from-primary to-accent text-white p-8 text-center">
      <h1 class="text-4xl font-black">TAILIEUTX1</h1>
      <p class="mt-2 opacity-90">Đăng nhập tài khoản</p>
    </div>

    <!-- Form -->
    <div class="p-8 space-y-6">
      <input
        id="email"
        type="email"
        placeholder="Email"
        class="w-full px-5 py-4 border-2 border-pink-200 rounded-2xl focus:border-primary focus:outline-none"
      />

      <input
        id="password"
        type="password"
        placeholder="Mật khẩu (≥ 6 ký tự)"
        class="w-full px-5 py-4 border-2 border-pink-200 rounded-2xl focus:border-primary focus:outline-none"
      />

      <button
        id="loginBtn"
        class="w-full py-4 bg-gradient-to-r from-primary to-accent text-white font-bold rounded-2xl hover:opacity-90 transition"
      >
        Đăng nhập
      </button>

      <button
        id="googleBtn"
        class="w-full py-4 border-2 border-gray-300 rounded-2xl font-bold flex items-center justify-center gap-3 hover:bg-gray-50 transition"
      >
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" class="w-6 h-6" />
        <span>Google</span>
      </button>

      <p id="message" class="text-center font-medium min-h-[1.5em]"></p>
    </div>
  </div>

  <!-- Supabase JS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Script logic -->
  <script>
  const { createClient } = supabase;

  // Cấu hình Supabase
  const SUPABASE_URL = "https://wdpekgcqmwpvbfyonjih.supabase.co";
  const SUPABASE_ANON_KEY =
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndkcGVrZ2NxbXdwdmJmeW9uamloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjUzODk4NjUsImV4cCI6MjA4MDk2NTg2NX0.qaIDzIZsGSifXO8PKM2jDAx7E6Earv2K7iFPQ8GqqaU";

  const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Elements
  const emailEl = document.getElementById("email");
  const passEl = document.getElementById("password");
  const msgEl = document.getElementById("message");

  // Hàm hiển thị thông báo
  function showMsg(text, isError = false) {
    msgEl.textContent = text;
    msgEl.style.color = isError ? "#dc2626" : "#10b981";
  }

  // Hàm chuyển hướng sau đăng nhập thành công (SỬA LẠI ĐÚNG)
  function redirect() {
    setTimeout(() => {
      window.location.href = "courses/index1.html";  // hoặc window.location.origin + "/index1.html" nếu cần full URL
    }, 800);
  }

  // Đăng nhập bằng email/password
  document.getElementById("loginBtn").onclick = async () => {
    const email = emailEl.value.trim();
    const password = passEl.value;

    if (!email || password.length < 6) {
      showMsg("Vui lòng nhập email và mật khẩu hợp lệ", true);
      return;
    }

    showMsg("Đang đăng nhập...");

    const { error } = await supabaseClient.auth.signInWithPassword({
      email,
      password,
    });

    if (error) {
      showMsg(error.message, true);
      return;
    }

    showMsg("Đăng nhập thành công!");
    redirect();
  };

  document.getElementById("googleBtn").onclick = async () => {
  const { data, error } = await supabaseClient.auth.signInWithOAuth({
    provider: "google",
    options: {
      redirectTo: window.location.origin + "/trangnt/courses/index1.html"  // THÊM /trangnt/
    }
  });

  if (error) {
    showMsg(error.message, true);
  }
};

  // Kiểm tra session hiện tại khi load trang
  supabaseClient.auth.getSession().then(({ data }) => {
    if (data.session) redirect();
  });

  // Lắng nghe thay đổi trạng thái auth
  supabaseClient.auth.onAuthStateChange((event, session) => {
    if (event === "SIGNED_IN" && session) {
      redirect();
    }
  });
</script>
</body>
</html>
