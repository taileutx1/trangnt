<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Đăng nhập - TAILIEUTX1</title>

  <!-- Tailwind (DEV OK – khi build thì chuyển CLI) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#ec4899',
            accent: '#f472b6',
            danger: '#dc2626'
          }
        }
      }
    }
  </script>
</head>

<body class="bg-gradient-to-br from-pink-50 to-purple-50 min-h-screen flex items-center justify-center px-4">

<div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden">
  <div class="bg-gradient-to-r from-primary to-accent text-white p-8 text-center">
    <h1 class="text-4xl font-black">TAILIEUTX1</h1>
    <p class="mt-2 opacity-90">Đăng nhập tài khoản</p>
  </div>

  <div class="p-8 space-y-6">
    <input id="email" type="email" placeholder="Email"
      class="w-full px-5 py-4 border-2 border-pink-200 rounded-2xl focus:border-primary focus:outline-none"/>

    <input id="password" type="password" placeholder="Mật khẩu (≥ 6 ký tự)"
      class="w-full px-5 py-4 border-2 border-pink-200 rounded-2xl focus:border-primary focus:outline-none"/>

    <button id="loginBtn"
      class="w-full py-4 bg-gradient-to-r from-primary to-accent text-white font-bold rounded-2xl">
      Đăng nhập
    </button>

    <button id="googleBtn"
      class="w-full py-4 border-2 rounded-2xl font-bold flex items-center justify-center gap-3">
      <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-6">
      Google
    </button>

    <p id="message" class="text-center font-medium"></p>
  </div>
</div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ================== CONFIG ================== */
const SUPABASE_URL = "https://wdpekgcqmwpvbfyonjih.supabase.co";
const SUPABASE_KEY = "sb_publishable_c_8MhuPqqpbgrw11AdA_ew_EK1iUlbp";

const supabase = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

/* ================== ELEMENTS ================== */
const emailEl = document.getElementById("email");
const passEl  = document.getElementById("password");
const msgEl   = document.getElementById("message");

/* ================== LOGIN EMAIL ================== */
document.getElementById("loginBtn").onclick = async () => {
  const email = emailEl.value.trim();
  const password = passEl.value;

  if (!email || password.length < 6) {
    showMsg("Email hoặc mật khẩu không hợp lệ", true);
    return;
  }

  showMsg("Đang đăng nhập...");

  const { error } = await supabase.auth.signInWithPassword({
    email, password
  });

  if (error) {
    showMsg(error.message, true);
    return;
  }

  showMsg("Đăng nhập thành công!");
  redirect();
};

/* ================== LOGIN GOOGLE ================== */
document.getElementById("googleBtn").onclick = async () => {
  const { error } = await supabase.auth.signInWithOAuth({
    provider: "google",
    options: {
      redirectTo: window.location.origin + "/courses/index1.html"
    }
  });

  if (error) showMsg(error.message, true);
};

/* ================== HELPERS ================== */
function showMsg(text, isError = false) {
  msgEl.textContent = text;
  msgEl.style.color = isError ? "#dc2626" : "#10b981";
}

function redirect() {
  setTimeout(() => {
    window.location.href = "/courses/index1.html";
  }, 1200);
}

/* ================== AUTO LOGIN ================== */
supabase.auth.getSession().then(({ data }) => {
  if (data.session) redirect();
});
</script>

</body>
</html>
