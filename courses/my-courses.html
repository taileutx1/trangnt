<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Khóa học của tôi - TAILIEUTX1</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Danh sách khóa học bạn đã kích hoạt">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#4f46e5',
            'primary-hover': '#4338ca'
          }
        }
      }
    }
  </script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-50 min-h-screen">

<!-- HEADER -->
<header class="bg-primary text-white shadow-lg sticky top-0 z-50">
  <div class="container mx-auto px-4 py-5 flex justify-between items-center">
    <a href="index1.html" class="text-2xl font-black tracking-wider">
      TAILIEUTX1
    </a>
    <div id="user-box" class="flex items-center gap-4"></div>
  </div>
</header>

<!-- MAIN -->
<main class="container mx-auto px-4 py-10 max-w-7xl">

  <div class="flex justify-between items-center mb-10">
    <h1 class="text-4xl font-black text-gray-800">Khóa học của tôi</h1>
    <a href="index1.html" class="text-primary font-semibold hover:underline">
      ← Mua thêm khóa học
    </a>
  </div>

  <!-- LOADING -->
  <div id="loading-state" class="text-center py-24">
    <div class="inline-block animate-spin w-12 h-12 border-4 border-primary border-t-transparent rounded-full"></div>
    <p class="mt-4 text-gray-600 text-lg">Đang tải khóa học của bạn...</p>
  </div>

  <!-- EMPTY -->
  <div id="empty-state" class="hidden text-center py-24">
    <p class="text-2xl font-bold text-gray-700 mb-4">
      Bạn chưa sở hữu khóa học nào
    </p>
    <a href="index1.html"
       class="inline-block bg-primary text-white px-10 py-4 rounded-xl font-bold hover:bg-primary-hover transition shadow-lg">
      Xem khóa học
    </a>
  </div>

  <!-- COURSE LIST -->
  <div id="my-courses-list"
       class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
  </div>

</main>

<script>
/* ================= SUPABASE INIT ================= */
const { createClient } = supabase;

const SUPABASE_URL = "https://wdpekgcqmwpvbfyonjih.supabase.co";
const SUPABASE_ANON_KEY = "YOUR_ANON_KEY_HERE";

const supabaseClient = createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY,
  {
    auth: {
      persistSession: true,
      autoRefreshToken: true
    }
  }
);

/* ================= AUTH HELPERS ================= */
async function getCurrentUser() {
  const { data } = await supabaseClient.auth.getSession();
  return data.session?.user || null;
}

async function logout() {
  await supabaseClient.auth.signOut();
  location.href = "login.html";
}

/* ================= HEADER USER ================= */
async function renderHeaderUser() {
  const box = document.getElementById("user-box");
  const user = await getCurrentUser();

  if (!user) {
    location.href = "login.html";
    return;
  }

  const name =
    user.user_metadata?.full_name ||
    user.user_metadata?.name ||
    user.email.split("@")[0];

  box.innerHTML = `
    <span class="font-semibold">${name}</span>
    <button onclick="logout()"
      class="bg-white/20 px-4 py-2 rounded-lg font-semibold hover:bg-white/30 transition">
      Đăng xuất
    </button>
  `;
}

/* ================= LOAD COURSES ================= */
async function renderMyCourses() {
  const listEl = document.getElementById("my-courses-list");
  const emptyEl = document.getElementById("empty-state");
  const loadingEl = document.getElementById("loading-state");

  loadingEl.classList.remove("hidden");
  emptyEl.classList.add("hidden");
  listEl.innerHTML = "";

  const user = await getCurrentUser();
  if (!user) return;

  const { data, error } = await supabaseClient
    .from("user_courses")
    .select(`
      progress,
      courses (
        id,
        title,
        image,
        slug
      )
    `)
    .eq("user_id", user.id);

  loadingEl.classList.add("hidden");

  if (error || !data || data.length === 0) {
    emptyEl.classList.remove("hidden");
    return;
  }

  listEl.innerHTML = data.map(item => {
    const c = item.courses;
    const progress = item.progress || 0;

    return `
      <div class="bg-white rounded-2xl shadow-lg overflow-hidden hover:shadow-2xl transition transform hover:-translate-y-1">
        <img src="${c.image || 'images/default-course.jpg'}"
             class="w-full h-56 object-cover">

        <div class="p-6 flex flex-col h-full">
          <h3 class="font-black text-xl text-gray-800 mb-4 line-clamp-2">
            ${c.title}
          </h3>

          <div class="mb-4">
            <div class="w-full bg-gray-200 rounded-full h-3">
              <div class="bg-primary h-3 rounded-full"
                   style="width:${progress}%"></div>
            </div>
            <p class="text-sm text-gray-500 mt-2">
              Hoàn thành ${progress}%
            </p>
          </div>

          <a href="course-${c.slug}.html"
             class="mt-auto block text-center bg-primary text-white py-3 rounded-xl font-bold hover:bg-primary-hover transition">
            Vào học ngay
          </a>
        </div>
      </div>
    `;
  }).join("");
}

/* ================= INIT ================= */
document.addEventListener("DOMContentLoaded", async () => {
  await renderHeaderUser();
  await renderMyCourses();
});
</script>

</body>
</html>
