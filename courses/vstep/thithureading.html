<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thi Thử IELTS Reading - Riêng Biệt Từng Passage</title>
  <style>
    body { font-family: Arial, Helvetica, sans-serif; margin: 0; padding: 20px; background: #f0f4f8; }
    .container { max-width: 1400px; margin: auto; background: white; padding: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); border-radius: 10px; }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #ddd; padding-bottom: 15px; }
    h1 { margin: 0; font-size: 28px; color: #1a5276; }
    #timer { font-size: 32px; font-weight: bold; color: #c0392b; }
    select { padding: 10px; font-size: 18px; margin-bottom: 15px; border-radius: 6px; border: 1px solid #ccc; width: 100%; max-width: 600px; }

    /* 4 Button Passage */
    .passage-buttons {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .passage-btn {
      padding: 12px 20px;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      transition: all 0.3s;
      min-width: 140px;
    }
    .passage-btn:hover { background: #2980b9; }
    .passage-btn.active {
      background: #e74c3c;
      transform: scale(1.05);
      box-shadow: 0 4px 10px rgba(231,76,60,0.3);
    }

    .test-area { display: flex; gap: 30px; margin-top: 20px; }
    .passage, .questions { 
      flex: 1; 
      padding: 25px; 
      border: 1px solid #bdc3c7; 
      border-radius: 10px; 
      background: #fdfdfd; 
      height: 75vh; 
      overflow-y: auto; 
      transition: all 0.3s;
    }
    .passage h2 { margin-top: 0; color: #2c3e50; font-size: 22px; }
    .passage p { line-height: 1.8; margin-bottom: 16px; }
    .passage.active { border-color: #e74c3c; background: #fef9e7; box-shadow: 0 0 15px rgba(231,76,60,0.2); }

    .question-group { display: none; }
    .question-group.active { display: block; }
    .question { margin-bottom: 28px; padding-bottom: 15px; border-bottom: 1px dashed #eee; }
    .question strong { display: block; margin-bottom: 10px; font-size: 18px; color: #2c3e50; }
    .options label { display: block; padding: 12px; margin: 6px 0; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
    .options label:hover { background: #ebf5fb; border-color: #3498db; }
    .options input[type="radio"] { display: none; }
    .options input[type="radio"]:checked + span { background: #2980b9; color: white; font-weight: bold; }
    .options span { display: block; padding: 10px; border-radius: 6px; }

    #submit { margin-top: 30px; padding: 15px 40px; font-size: 20px; background: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer; }
    #submit:disabled { background: #95a5a6; cursor: not-allowed; }
    #result { margin-top: 40px; padding: 25px; background: #d5f5e3; border-radius: 10px; font-size: 22px; display: none; }

    @media (max-width: 1000px) {
      .test-area { flex-direction: column; }
      .passage, .questions { height: auto; max-height: 70vh; }
      .passage-buttons { justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Thi Thử IELTS Academic Reading</h1>
      <div id="timer">60:00</div>
    </header>

    <select id="testSelector">
      <option value="">-- Chọn đề thi --</option>
    </select>

    <!-- 4 Button Passage -->
    <div class="passage-buttons" id="passageButtons" style="display:none;">
      <button class="passage-btn active" data-index="0">Passage 1<br><small>(Câu 1-10)</small></button>
      <button class="passage-btn" data-index="1">Passage 2<br><small>(Câu 11-20)</small></button>
      <button class="passage-btn" data-index="2">Passage 3<br><small>(Câu 21-30)</small></button>
      <button class="passage-btn" data-index="3">Passage 4<br><small>(Câu 31-40)</small></button>
    </div>

    <div class="test-area" id="testArea" style="display:none;">
      <div class="passage" id="passage"></div>
      <div class="questions" id="questions"></div>
    </div>

    <button id="submit" style="display:none;">Nộp bài</button>
    <div id="result"></div>
  </div>

  <script src="data.js"></script>
  <script>
    let currentTest = null;
    let timeLeft = 3600;
    let timerId = null;
    let currentPassageIndex = 0;

    // Đổ danh sách đề
    const selector = document.getElementById('testSelector');
    ieltsReadingTests.forEach((test, index) => {
      const opt = document.createElement('option');
      opt.value = index;
      opt.textContent = test.title;
      selector.appendChild(opt);
    });

    selector.addEventListener('change', () => {
      const index = selector.value;
      if (index === "") return;
      currentTest = ieltsReadingTests[index];
      loadAllPassagesAndQuestions();
      showPassage(0); // Mở Passage 1 đầu tiên
      document.getElementById('testArea').style.display = 'flex';
      document.getElementById('passageButtons').style.display = 'flex';
      document.getElementById('submit').style.display = 'block';
      document.getElementById('result').style.display = 'none';
      document.getElementById('submit').disabled = false;
      resetTimer();
    });

    function startTimer() {
      clearInterval(timerId);
      timerId = setInterval(() => {
        timeLeft--;
        const min = String(Math.floor(timeLeft / 60)).padStart(2, '0');
        const sec = String(timeLeft % 60).padStart(2, '0');
        document.getElementById('timer').textContent = `${min}:${sec}`;
        if (timeLeft <= 0) {
          clearInterval(timerId);
          submitTest();
        }
      }, 1000);
    }

    function resetTimer() {
      clearInterval(timerId);
      timeLeft = 3600;
      document.getElementById('timer').textContent = "60:00";
      startTimer();
    }

    // Tạo HTML cho tất—of passages và questions (nhưng ẩn đi)
    function loadAllPassagesAndQuestions() {
      const passageContainer = document.getElementById('passage');
      const questionsContainer = document.getElementById('questions');

      passageContainer.innerHTML = '';
      questionsContainer.innerHTML = '';

      currentTest.passages.forEach((p, i) => {
        // Passage
        const passageDiv = document.createElement('div');
        passageDiv.id = `passage-content-${i}`;
        passageDiv.className = 'passage-content';
        passageDiv.style.display = 'none';
        passageDiv.innerHTML = `<h2>Passage ${i+1}: ${p.title}</h2>${p.text}`;
        passageContainer.appendChild(passageDiv);

        // Questions group
        const qGroup = document.createElement('div');
        qGroup.id = `questions-group-${i}`;
        qGroup.className = 'question-group';
        qGroup.style.display = 'none';

        let qHTML = `<h3 style="color:#e74c3c; margin-top:0;">Câu ${p.questions[0].no} - ${p.questions[p.questions.length-1].no}</h3>`;
        p.questions.forEach(q => {
          qHTML += `<div class="question"><strong>${q.no}. ${q.question}</strong><div class="options">`;
          q.options.forEach(opt => {
            qHTML += `<label><input type="radio" name="q${q.no}" value="${opt}"><span>${opt}</span></label>`;
          });
          qHTML += `</div></div>`;
        });
        qGroup.innerHTML = qHTML;
        questionsContainer.appendChild(qGroup);
      });

      // Gắn sự kiện cho button
      document.querySelectorAll('.passage-btn').forEach(btn => {
        btn.onclick = () => {
          const idx = parseInt(btn.dataset.index);
          showPassage(idx);
        };
      });
    }

    // Hiển thị passage + questions tương ứng
    function showPassage(index) {
      // Ẩn tất cả
      document.querySelectorAll('.passage-content').forEach(el => el.style.display = 'none');
      document.querySelectorAll('.question-group').forEach(el => el.style.display = 'none');
      document.querySelectorAll('.passage-btn').forEach(b => b.classList.remove('active'));

      // Hiện cái được chọn
      document.getElementById(`passage-content-${index}`).style.display = 'block';
      document.getElementById(`questions-group-${index}`).style.display = 'block';
      document.querySelector(`.passage-btn[data-index="${index}"]`).classList.add('active');

      // Scroll nhẹ nhàng
      document.getElementById(`passage-content-${index}`).scrollIntoView({ behavior: 'smooth', block: 'start' });
      currentPassageIndex = index;
    }

    function getBand(score, total) {
      const percent = Math.round(score / total * 40);
      if (percent >= 39) return 9.0;
      if (percent >= 37) return 8.5;
      if (percent >= 35) return 8.0;
      if (percent >= 33) return 7.5;
      if (percent >= 30) return 7.0;
      if (percent >= 27) return 6.5;
      if (percent >= 23) return 6.0;
      if (percent >= 19) return 5.5;
      if (percent >= 15) return 5.0;
      return "Dưới 5.0";
    }

    function submitTest() {
      clearInterval(timerId);
      if (!currentTest) return;

      let correct = 0;
      let totalQuestions = 0;
      currentTest.passages.forEach(p => {
        totalQuestions += p.questions.length;
        p.questions.forEach(q => {
          const selected = document.querySelector(`input[name="q${q.no}"]:checked`);
          if (selected && selected.value.trim() === q.answer.trim()) correct++;
        });
      });

      const band = getBand(correct, totalQuestions);
      document.getElementById('result').innerHTML = `
        <h2>🎉 Kết quả bài thi</h2>
        <p><strong>Điểm số: ${correct} / ${totalQuestions}</strong></p>
        <p><strong>Band ước tính: ${band}</strong></p>
        <p>Xem lại đáp án? Click từng Passage để kiểm tra!</p>
      `;
      document.getElementById('result').style.display = 'block';
      document.getElementById('submit').disabled = true;
    }

    document.getElementById('submit').addEventListener('click', submitTest);
  </script>
</body>
</html>
