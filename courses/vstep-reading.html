<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bài thi thử VSTEP Reading - TAILIEUTX1</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#ec4899',
            accent: '#f472b6',
            danger: '#dc2626',
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>

<body class="bg-gradient-to-br from-pink-50 to-purple-50 min-h-screen font-sans">

  <!-- HEADER (giống các trang khác) -->
  <header class="bg-gradient-to-r from-primary to-accent text-white shadow-2xl sticky top-0 z-40">
    <div class="container mx-auto px-4 py-5 flex justify-between items-center">
      <a href="index1.html" class="text-3xl font-black tracking-wider">TAILIEUTX1</a>

      <nav class="hidden md:flex items-center space-x-6 text-lg font-medium">
        <a href="index1.html" class="hover:opacity-80 transition">Trang chủ</a>
        <a href="my-courses.html" class="hover:opacity-80 transition font-semibold">Khóa học của tôi</a>
        <button onclick="openActivateModal()" class="bg-white text-primary px-6 py-2 rounded-full font-bold hover:bg-gray-100 transition">
          Kích hoạt mã
        </button>

        <button id="desktop-login-btn" onclick="window.location.href='login.html'" 
                class="bg-white text-primary px-6 py-2 rounded-full font-bold hover:bg-gray-100 transition">
          Đăng nhập
        </button>

        <div id="desktop-user-info" class="hidden relative">
          <button onclick="toggleDropdown('desktop-dropdown')" class="focus:outline-none">
            <div class="w-10 h-10 rounded-full p-1 bg-gradient-to-br from-primary to-accent transition-transform duration-300 hover:scale-105 hover:shadow-lg">
              <img id="desktop-user-avatar" src="" alt="Avatar" class="w-full h-full rounded-full bg-white">
            </div>
          </button>
          <div id="desktop-dropdown" class="absolute right-0 top-full mt-3 w-56 bg-white rounded-2xl shadow-2xl overflow-hidden hidden z-50">
            <div class="px-5 py-4 border-b border-pink-100">
              <p class="font-bold text-primary" id="desktop-username"></p>
              <p class="text-sm text-gray-600 mt-1 truncate" id="desktop-email"></p>
            </div>
            <button onclick="logout()" class="block w-full text-left px-5 py-4 text-gray-800 hover:bg-pink-100 transition font-semibold">
              Đăng xuất
            </button>
          </div>
        </div>
      </nav>

      <button aria-label="Mở menu" class="md:hidden flex flex-col space-y-1.5 hamburger" onclick="toggleMobileMenu()">
        <span class="block w-8 h-1 bg-white"></span>
        <span class="block w-8 h-1 bg-white"></span>
        <span class="block w-8 h-1 bg-white"></span>
      </button>
    </div>

    <!-- Mobile menu tương tự các trang khác -->
    <nav id="mobile-menu" class="md:hidden mt-6 flex-col space-y-4 hidden px-4 pb-4">
      <a href="index1.html" class="block py-2 text-lg hover:opacity-80">Trang chủ</a>
      <a href="my-courses.html" class="block py-2 text-lg hover:opacity-80 font-semibold">Khóa học của tôi</a>
      <button onclick="openActivateModal(); toggleMobileMenu()" class="bg-white text-primary px-6 py-3 rounded-full font-bold w-full">Kích hoạt mã</button>
      <button id="mobile-login-btn" onclick="window.location.href='login.html'; toggleMobileMenu()" class="bg-white text-primary px-6 py-3 rounded-full font-bold w-full">Đăng nhập</button>
      <div id="mobile-user-info" class="hidden flex items-center space-x-4 bg-white/10 rounded-xl p-4">
        <div class="w-10 h-10 rounded-full p-1 bg-gradient-to-br from-primary to-accent">
          <img id="mobile-user-avatar" src="" alt="Avatar" class="w-full h-full rounded-full bg-white">
        </div>
        <p id="mobile-username" class="text-white font-semibold"></p>
      </div>
      <div id="mobile-user-menu" class="hidden">
        <button onclick="logout(); toggleMobileMenu()" class="block w-full text-left py-3 px-4 bg-white/10 rounded-lg hover:bg-white/20">Đăng xuất</button>
      </div>
    </nav>
  </header>

 <!-- MAIN CONTENT -->
 <main class="container mx-auto px-4 py-12 max-w-5xl">
    <!-- Danh sách đề thi (ban đầu) -->
    <div id="test-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      <!-- Các card đề sẽ được load động từ Supabase -->
    </div>

    <!-- Trang bài thi (ẩn ban đầu) -->
    <div id="test-page" class="hidden">
      <div class="bg-white rounded-3xl shadow-2xl p-10 mb-12 text-center">
        <h1 class="text-4xl font-black text-gray-800 mb-4" id="test-title"></h1>
        <p class="text-2xl text-gray-600 mb-8">4 passages • 40 câu hỏi • Thời gian: 60 phút</p>
        
        <div class="flex flex-col items-center">
          <div id="timer" class="text-5xl font-black text-primary mb-4">60:00</div>
          <div class="w-full max-w-md bg-gray-200 rounded-full h-3">
            <div id="progress" class="h-3 bg-gradient-to-r from-primary to-accent rounded-full w-0 transition-all duration-1000"></div>
          </div>
        </div>
      </div>

      <form id="reading-form" class="space-y-20"></form>

      <div class="text-center mt-12">
        <button type="button" id="submit-test-btn" class="px-12 py-6 text-2xl font-bold text-white bg-gradient-to-r from-primary to-accent rounded-2xl shadow-2xl hover:scale-105 transition">
          NỘP BÀI & XEM KẾT QUẢ
        </button>
      </div>

      <div id="result" class="hidden mt-12 bg-white rounded-3xl shadow-2xl p-12 text-center">
        <h2 class="text-4xl font-bold text-primary mb-8">Kết quả của bạn 🎉</h2>
        <p class="text-3xl mb-6" id="score-display"></p>
        <p class="text-2xl text-gray-600 mb-8">Điểm quy đổi (thang 10): <span id="scaled-score" class="font-bold text-primary text-4xl"></span></p>
        <button onclick="location.reload()" class="px-10 py-4 bg-primary text-white rounded-xl font-bold">Làm lại đề khác</button>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const { createClient } = supabase;
    const supabaseClient = createClient('https://wdpekgcqmwpvbfyonjih.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndkcGVrZ2NxbXdwdmJmeW9uamloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjUzODk4NjUsImV4cCI6MjA4MDk2NTg2NX0.qaIDzIZsGSifXO8PKM2jDAx7E6Earv2K7iFPQ8GqqaU');
    // Xử lý session & update header user (bắt buộc cho mọi trang có header auth)
    async function updateUserUI() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      const user = session?.user;

      if (user) {
        const name = user.user_metadata?.full_name || user.email.split('@')[0];
        const email = user.email;
        const avatar = user.user_metadata?.picture || user.user_metadata?.avatar_url || 'https://via.placeholder.com/40';

        // Desktop
        document.getElementById('desktop-username').textContent = name;
        document.getElementById('desktop-email').textContent = email;
        document.getElementById('desktop-user-avatar').src = avatar;
        document.getElementById('desktop-user-info').classList.remove('hidden');
        document.getElementById('desktop-login-btn')?.classList.add('hidden');

        // Mobile
        document.getElementById('mobile-username').textContent = name;
        document.getElementById('mobile-user-avatar').src = avatar;
        document.getElementById('mobile-user-info').classList.remove('hidden');
        document.getElementById('mobile-user-menu').classList.remove('hidden');
        document.getElementById('mobile-login-btn')?.classList.add('hidden');
      } else {
        document.getElementById('desktop-user-info').classList.add('hidden');
        document.getElementById('desktop-login-btn')?.classList.remove('hidden');
        document.getElementById('mobile-user-info')?.classList.add('hidden');
        document.getElementById('mobile-user-menu')?.classList.add('hidden');
        document.getElementById('mobile-login-btn')?.classList.remove('hidden');
      }
    }

    // Xử lý hash OAuth (nếu có)
    supabaseClient.auth.getSession().then(() => updateUserUI());

    supabaseClient.auth.onAuthStateChange((_event, session) => {
      updateUserUI();
    });

    // Đăng xuất
    function logout() {
      supabaseClient.auth.signOut().then(() => location.reload());
    }
    let currentTestId = null;
    let passages = []; // [{passage, questions}]
    let timeLeft = 3600;
    let timerInterval;

    // Load danh sách đề thi
       async function loadTests() {
      try {
        const { data: tests, error } = await supabaseClient.from('tests').select('id, title');
        
        if (error) {
          console.error('Lỗi load đề thi:', error);
          document.getElementById('test-list').innerHTML = `
            <div class="col-span-full text-center py-20">
              <p class="text-2xl text-gray-600">Không tải được đề thi. Vui lòng đăng nhập hoặc thử lại sau.</p>
              <button onclick="location.reload()" class="mt-4 px-8 py-4 bg-primary text-white rounded-xl font-bold">Thử lại</button>
            </div>`;
          return;
        }

        if (!tests || tests.length === 0) {
          document.getElementById('test-list').innerHTML = '<p class="col-span-full text-center text-2xl text-gray-600">Chưa có đề thi nào</p>';
          return;
        }

        const list = document.getElementById('test-list');
        list.innerHTML = '';
        tests.forEach(test => {
          const card = document.createElement('div');
          card.className = 'bg-white rounded-3xl shadow-2xl p-8 text-center cursor-pointer hover:scale-105 transition';
          card.innerHTML = `<h3 class="text-2xl font-black text-primary mb-4">${test.title}</h3>
                            <button class="px-8 py-4 bg-gradient-to-r from-primary to-accent text-white rounded-xl font-bold">Làm bài</button>`;
          card.onclick = () => startTest(test.id, test.title);
          list.appendChild(card);
        });
      } catch (err) {
        console.error('Lỗi bất ngờ:', err);
        document.getElementById('test-list').innerHTML = '<p class="text-red-600 text-center">Lỗi kết nối. Kiểm tra console.</p>';
      }
    }
    // Bắt đầu bài thi
    async function startTest(testId, title) {
      currentTestId = testId;
      document.getElementById('test-title').textContent = title;
      document.getElementById('test-list').classList.add('hidden');
      document.getElementById('test-page').classList.remove('hidden');

      // Load 4 passages + questions
      const { data: passageData } = await supabaseClient.from('passages').select('*, questions(*)').eq('test_id', testId).order('passage_number');
      passages = passageData;

      renderPassages();
      startTimer();
    }

    // Render từng passage với button giải riêng
    function renderPassages() {
      const form = document.getElementById('reading-form');
      form.innerHTML = '';

      passages.forEach((p, pIndex) => {
        const section = document.createElement('section');
        section.className = 'passage-section bg-white rounded-3xl shadow-xl p-8';
        section.innerHTML = `
          <h2 class="text-3xl font-bold text-primary mb-6">Passage ${p.passage_number}</h2>
          <div class="passage-text bg-pink-50 p-8 rounded-2xl mb-8">${p.passage_text}</div>
          <div class="grid gap-8 md:grid-cols-2" id="questions-${pIndex}"></div>
          <div class="text-center mt-8">
            <button type="button" class="check-passage-btn px-8 py-4 bg-accent text-white rounded-xl font-bold" data-index="${pIndex}">
              Xem đáp án & Giải thích Passage ${p.passage_number}
            </button>
            <div class="passage-feedback hidden mt-6 text-lg font-bold text-green-600" id="feedback-${pIndex}"></div>
          </div>
        `;
        form.appendChild(section);

        const qContainer = section.querySelector(`#questions-${pIndex}`);
        p.questions.forEach((q, qIndex) => {
          const qDiv = document.createElement('div');
          qDiv.innerHTML = `
            <p class="font-bold text-lg mb-4">Câu ${pIndex*10 + qIndex + 1}: ${q.question_text}</p>
            <div class="space-y-3">
              ${['a','b','c','d'].map(opt => `
                <label class="block p-4 rounded-xl border-2 border-transparent hover:border-primary hover:bg-pink-50 cursor-pointer">
                  <input type="radio" name="q${q.id}" value="${opt}" class="accent-primary mr-3">
                  <span>${q[`option_${opt}`]}</span>
                </label>
              `).join('')}
            </div>
          `;
          qContainer.appendChild(qDiv);
        });

        // Button giải passage
        section.querySelector('.check-passage-btn').onclick = () => checkPassage(pIndex);
      });
    }

    // Giải từng passage
    function checkPassage(pIndex) {
      const passage = passages[pIndex];
      let correct = 0;
      passage.questions.forEach(q => {
        const selected = document.querySelector(`input[name="q${q.id}"]:checked`);
        const options = document.querySelectorAll(`input[name="q${q.id}"]`);
        options.forEach(opt => {
          const label = opt.parentElement;
          if (opt.value === q.correct_option) {
            label.classList.add('bg-green-100', 'border-green-500');
          } else if (opt.checked && opt.value !== q.correct_option) {
            label.classList.add('bg-red-100', 'border-red-500');
          }
        });
        if (selected && selected.value === q.correct_option) correct++;
      });

      const feedback = document.getElementById(`feedback-${pIndex}`);
      feedback.textContent = `Passage ${pIndex+1}: Bạn đúng ${correct}/10 câu`;
      feedback.classList.remove('hidden');
    }

    // Timer
    function startTimer() {
      timerInterval = setInterval(() => {
        timeLeft--;
        const min = String(Math.floor(timeLeft / 60)).padStart(2, '0');
        const sec = String(timeLeft % 60).padStart(2, '0');
        document.getElementById('timer').textContent = `${min}:${sec}`;
        document.getElementById('progress').style.width = `${((3600 - timeLeft)/3600)*100}%`;

        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          submitTest();
        }
      }, 1000);
    }

    // Nộp bài cuối cùng
    function submitTest() {
      clearInterval(timerInterval);
      let totalCorrect = 0;
      passages.forEach(p => p.questions.forEach(q => {
        const selected = document.querySelector(`input[name="q${q.id}"]:checked`);
        if (selected && selected.value === q.correct_option) totalCorrect++;
      }));

      document.getElementById('score-display').innerHTML = `Bạn đúng <span class="text-green-600 text-5xl">${totalCorrect}</span> / 40 câu`;
      const scaled = (totalCorrect / 40 * 10).toFixed(1);
      document.getElementById('scaled-score').textContent = scaled;
      document.getElementById('result').classList.remove('hidden');
      document.getElementById('submit-test-btn').disabled = true;
    }

    document.getElementById('submit-test-btn').onclick = submitTest;

    // Load danh sách đề khi mở trang
    loadTests();
        // Khởi chạy khi load trang
    window.addEventListener('load', () => {
      updateUserUI();
      loadTests();
    });
  </script>
</body>
</html>
