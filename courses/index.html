<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TAILIEUTX1 - Khóa học online chất lượng cao</title>
  <meta name="description" content="Khóa học Toán, Hóa, Lý THPT - Luyện thi đại học hiệu quả">

  <!-- Tailwind CDN (không cần file css riêng nữa) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#4f46e5',   // indigo-600
            secondary: '#1e293b'  // slate-800
          }
        }
      }
    }
  </script>
  <style>
    .course-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
    .activate-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 9999; }
    .activate-modal.active { display: flex; }
    .activate-box { background: white; padding: 2rem; border-radius: 1rem; width: 90%; max-width: 420px; text-align: center; }
    .btn-submit { @apply bg-primary text-white px-6 py-3 rounded-lg font-semibold hover:bg-indigo-700 transition; }
    .btn-cancel { @apply bg-gray-300 text-gray-800 px-6 py-3 rounded-lg font-semibold mt-2 hover:bg-gray-400 transition; }
  </style>
</head>

<body class="bg-gray-50 min-h-screen">

  <!-- HEADER -->
  <header class="bg-primary text-white shadow-lg sticky top-0 z-50">
    <div class="container mx-auto px-4 py-4 flex justify-between items-center">
      <a href="index.html" class="text-2xl font-bold tracking-wider">TAILIEUTX1</a>
      
      <nav class="hidden md:flex items-center space-x-8">
        <a href="index.html" class="hover:text-indigo-200 transition">Trang chủ</a>
        <a href="my-courses.html" class="hover:text-indigo-200 transition">Khóa của tôi</a>
        <a href="javascript:void(0)" onclick="openActivatePopup()" class="hover:text-indigo-200 transition font-medium">
          Kích hoạt mã
        </a>
      </nav>

      <div id="header-user" class="flex items-center space-x-4"></div>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="container mx-auto px-4 py-10">
    <h2 class="text-3xl font-bold text-center mb-10 text-gray-800">Khóa học mới cập nhật</h2>

    <!-- SEARCH BAR -->
    <div class="max-w-2xl mx-auto mb-10">
      <input type="text" id="search-input" placeholder="Tìm kiếm khóa học..." 
             class="w-full px-5 py-4 rounded-xl border border-gray-300 focus:border-primary focus:outline-none text-lg shadow-sm">
    </div>

    <!-- COURSE GRID -->
    <div id="course-list" class="course-grid">
      <!-- JS sẽ render ở đây -->
    </div>

    <!-- EMPTY STATE -->
    <div id="empty-state" class="text-center py-20 text-gray-500 hidden">
      <p class="text-2xl mb-4">Không tìm thấy khóa học nào</p>
      <a href="index.html" class="text-primary underline">Thử lại</a>
    </div>
  </main>

  <!-- POPUP KÍCH HOẠT MÃ -->
  <div id="activate-popup" class="activate-modal">
    <div class="activate-box">
      <h3 class="text-2xl font-bold mb-6 text-gray-800">Kích hoạt mã khóa học</h3>
      
      <input type="text" id="activate-code" placeholder="Nhập mã kích hoạt..." 
             class="w-full px-4 py-3 border border-gray-300 rounded-lg mb-4 focus:border-primary focus:outline-none text-lg">

      <button onclick="activateCourse()" class="btn-submit w-full">
        Kích hoạt ngay
      </button>
      
      <button onclick="closeActivatePopup()" class="btn-cancel w-full">
        Đóng
      </button>

      <p id="activate-message" class="mt-4 text-lg font-medium"></p>
    </div>
  </div>

  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/app.js"></script>
</body>
</html>
