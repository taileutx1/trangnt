<!doctype html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Thanh toán ngân hàng</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css">
<style>
body{
  font-family: Arial, sans-serif;
  background:#f7f7f7;
  margin:0;
  padding:0;
}
.box{
  background:#fff;
  padding:30px 20px;
  border-radius:16px;
  max-width:420px;
  margin:30px auto;
  box-shadow:0 8px 30px rgba(0,0,0,.1);
  text-align:center;
}
.qr img{
  width:220px;
  height:220px;
  border-radius:12px;
  margin:20px auto;
  display:block;
  border:1px solid #ddd;
}
.big{
  font-size:32px;
  font-weight:900;
  color:#e91e63;
  margin:20px 0;
}
.copy{
  background:#f0f0f0;
  border-radius:10px;
  padding:14px;
  margin:10px 0;
  cursor:pointer;
  font-size:16px;
  transition:.3s;
  user-select:none;
}
.copy:hover{
  background:#e0e0e0;
  transform:translateY(-2px);
}
.copy:active{
  background:#c8e6c9;
}
.timer{
  margin:25px 0;
  font-size:18px;
  font-weight:bold;
  color:#d32f2f;
}
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  font-size:16px;
  cursor:pointer;
  margin-top:10px;
}
.ghost{
  background:transparent;
  border:2px solid #ddd;
  background:transparent;
  color:#333;
}
.primary{
  background:#667eea;
  color:white;
  font-weight:bold;
}

/* Popup hỗ trợ */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}
.popup-content{
  background:white;
  padding:30px;
  border-radius:16px;
  width:90%;
  max-width:380px;
  box-shadow:0 10px 40px rgba(0,0,0,.2);
}
.popup input, .popup textarea{
  width:100%;
  padding:12px;
  border:1px solid #ccc;
  border-radius:10px;
  margin:10px 0;
  font-size:15px;
}
</style>
</head>
<body>

<div class="box">
  <h2>Thanh toán chuyển khoản</h2>

  <!-- QR -->
  <div class="qr">
    <img id="qr" src="" alt="QR Vietcombank">
  </div>

  <!-- SỐ TIỀ TIỀN -->
  <div class="big" id="big-price">0 VND</div>

  <!-- THÔNG TIN NGÂN HÀNG -->
  <div class="copy">Ngân hàng: Vietcombank - CN Tân Bình</div>
  <div class="copy">Chủ tài khoản: <strong>PHAM NHAT HUY</strong></div>
  <div class="copy">Số tài khoản: <strong>1017125247</strong></div>
  <div id="noidung" class="copy">
    Nội dung chuyển khoản: <strong id="order-id-display"></strong>
  </div>

  <div class="timer">Còn lại <span id="countdown">20:00</span></div>

  <button class="ghost" onclick="openForm()">Gửi ảnh chuyển khoản / Hỗ trợ</button>
  <button class="primary" onclick="history.back()">Quay lại</button>
</div>

<!-- POPUP HỖ TRỢ -->
<div id="support-popup" class="popup">
  <div class="popup-content">
    <h3>Gửi thông tin hỗ trợ</h3>
    <input type="text" id="sp-name" placeholder="Họ và tên">
    <input type="email" id="sp-email" placeholder="Email nhận tài khoản học">
    <textarea id="sp-note" rows="4" placeholder="Ghi chú (nếu có)"></textarea>
    <button class="primary" onclick="sendSupport()">Gửi ngay</button>
    <button class="ghost" onclick="closeForm()">Đóng</button>
  </div>
</div>

<script>
// === LẤY DỮ LIỆU TỪ URL ===
const params = new URLSearchParams(window.location.search);
const title = params.get('title') || "Khóa học";
const price = parseInt(params.get('price')) || 499000;
const orderId = params.get('orderId') || "HD" + Date.now();

// === HIỂN THỊ LÊN MÀN HÌNH ===
document.getElementById("big-price").textContent = price.toLocaleString("vi-VN") + " VND";
document.getElementById("order-id-display").textContent = orderId;

// === TẠO QR SIÊU CHUẨN (VietQR) ===
document.getElementById("qr").src = 
  `https://img.vietqr.io/image/vietcombank-1017125247-compact2.png?amount=${price}&addInfo=${orderId}&accountName=PHAM NHAT HUY`;

// === COPY KHI CLICK ===
document.querySelectorAll('.copy').forEach(el => {
  el.onclick = function() {
    let text = this.textContent || this.innerText;
    if (this.id === 'noidung') text = orderId;
    navigator.clipboard.writeText(text.trim()).then(() => {
      this.style.background = '#c8e6c9';
      setTimeout(() => this.style.background = '#f0f0f0', 800);
    });
  }
});

// === ĐẾM NGƯỢC 20 PHÚT ===
let t = 20 * 60;
const cd = document.getElementById('countdown');
const timer = setInterval(() => {
  t--;
  const m = String(Math.floor(t / 60)).padStart(2, '0');
  const s = String(t % 60).padStart(2, '0');
  cd.textContent = `${m}:${s}`;
  if (t <= 0) {
    clearInterval(timer);
    cd.textContent = "Hết hạn!";
  }
}, 1000);

// === POPUP HỖ TRỢ ===
function openForm() {
  document.getElementById("support-popup").style.display = "flex";
}
function closeForm() {
  document.getElementById("support-popup").style.display = "none";
}
function sendSupport() {
  alert("Đã nhận thông tin! Chúng tôi sẽ gửi tài khoản học qua email trong 5 phút!");
  window.location.href = "index.html";
}
</script>

</body>
</html>
