<!doctype html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Thanh toán</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css">
<link rel="stylesheet" href="checkout.css">
</head>
<body>

<div class="checkout-wrapper">

  <!-- LEFT -->
  <div class="checkout-box">
    <h2>1,600,000 VND</h2>

    <p><strong>Mã đơn hàng:</strong> HD3VP28_Basic_21617807</p>
    <p><strong>Đơn vị cung cấp:</strong> Phạm Nhật Huy</p>
    <p><strong>Nội dung:</strong> Thanh toán Premium THPT 2026</p>

    <p><strong>Giá trị:</strong> 1,600,000 VND</p>
    <p><strong>Phí:</strong> 0 VND</p>

    <div class="timer">
      Còn lại <span>19:58</span>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="payment">
    <h3>Chọn phương thức thanh toán</h3>

 

    <label class="pay-item">
      <input type="radio" name="pay">
      <span>Chuyển khoản ngân hàng</span>
    </label>


    <div class="pay-actions">
      <button class="ghost">Hủy</button>
      <button class="primary" onclick="location.href='checkout-bank.html'">
  Tiếp tục
</button>
    </div>

  </div>

</div>

</body>
</html>
