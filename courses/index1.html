<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind CSS CDN -->

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#ec4899',
            accent: '#f472b6',
            danger: '#dc2626'

      }
    }
  </script>
</head>

<body class="bg-gradient-to-br from-pink-50 to-purple-50 min-h-screen">
  <!-- HEADER -->
  <header class="bg-gradient-to-r from-primary to-accent text-white shadow-2xl sticky top-0 z-40">
    <div class="container mx-auto px-4 py-5 flex justify-between items-center">
      <a href="/trangnt/courses/index1.html" class="text-3xl font-black tracking-wider">TAILIEUTX1</a>

      <!-- Desktop Navigation -->
      <nav class="hidden md:flex items-center space-x-6 text-lg font-medium">
        <a href="index1.html" class="bg-white text-primary px-6 py-2 rounded-full font-bold hover:bg-gray-100 transition">Trang chủ</a>
        <button id="my-courses-btn" class="bg-white text-primary px-6 py-2 rounded-full font-bold hover:bg-gray-100 transition">Khóa học của tôi</button>
        <button id="activate-btn" class="bg-white text-primary px-6 py-2 rounded-full font-bold hover:bg-gray-100 transition">Kích hoạt mã</button>

        <!-- Nút Đăng nhập (ẩn khi đã login) -->
        <a href="login.html" id="desktop-login-btn" class="bg-white text-primary px-6 py-2 rounded-full font-bold hover:bg-gray-100 transition">
          Đăng nhập
        </a>

        <!-- User info khi đã login -->
        <div id="desktop-user-info" class="hidden relative">
          <button id="desktop-dropdown-toggle" class="focus:outline-none">
            <div class="w-10 h-10 rounded-full p-1 bg-gradient-to-br from-primary to-accent transition-transform duration-300 hover:scale-105 hover:shadow-lg">
              <img id="desktop-user-avatar" src="" alt="Avatar" class="w-full h-full rounded-full object-cover bg-white">
            </div>
          </button>
          <div id="desktop-dropdown" class="absolute right-0 top-full mt-3 w-56 bg-white rounded-2xl shadow-2xl overflow-hidden hidden z-50">
            <div class="px-5 py-4 border-b border-pink-100">
              <p class="font-bold text-primary" id="desktop-username"></p>
              <p class="text-sm text-gray-600 mt-1" id="desktop-email"></p>
            </div>
            <button id="logout-btn-desktop" class="block w-full text-left px-5 py-4 text-gray-800 hover:bg-pink-100 transition font-semibold">
              Đăng xuất
            </button>
          </div>
        </div>
      </nav>

      <!-- Mobile Hamburger -->
      <button id="mobile-menu-toggle" aria-label="Mở menu" class="md:hidden flex flex-col space-y-1.5">
        <span class="block w-8 h-1 bg-white transition"></span>
        <span class="block w-8 h-1 bg-white transition"></span>
        <span class="block w-8 h-1 bg-white transition"></span>
      </button>
    </div>

    <!-- Mobile Menu -->
    <nav id="mobile-menu" class="md:hidden mt-6 flex-col space-y-4 hidden px-4 pb-6">
      <a href="index1.html" class="block py-2 text-lg hover:opacity-80">Trang chủ</a>
      <button id="mobile-my-courses-btn" class="block text-left py-2 text-lg hover:opacity-80">Khóa học của tôi</button>
      <button id="mobile-activate-btn" class="bg-white text-primary px-6 py-3 rounded-full font-bold w-full hover:bg-gray-100">Kích hoạt mã</button>

      <a href="login.html" id="mobile-login-btn" class="bg-white text-primary px-6 py-3 rounded-full font-bold w-full hover:bg-gray-100 text-center block">
        Đăng nhập
      </a>

      <div id="mobile-user-info" class="hidden flex items-center space-x-4 bg-white/10 rounded-xl p-4">
        <div class="w-12 h-12 rounded-full p-1 bg-gradient-to-br from-primary to-accent">
          <img id="mobile-user-avatar" src="" alt="Avatar" class="w-full h-full rounded-full object-cover bg-white">
        </div>
        <div>
          <p id="mobile-username" class="text-white font-semibold"></p>
          <p id="mobile-email" class="text-sm text-white/80"></p>
        </div>
      </div>

      <div id="mobile-user-menu" class="hidden space-y-2">
        <button id="logout-btn-mobile" class="block w-full text-left py-3 px-4 bg-white/10 rounded-lg hover:bg-white/20">
          Đăng xuất
        </button>
      </div>
    </nav>
  </header>

  <!-- MAIN CONTENT -->
  <main class="container mx-auto px-4 py-12">
    <section aria-labelledby="main-heading">
      <h1 id="main-heading" class="text-4xl md:text-5xl font-black text-center mb-4 text-gray-800">
        KHÓA HỌC MỚI - ƯU ĐÃI CỰC SỐC
      </h1>

      <div class="max-w-3xl mx-auto mb-12">
        <input type="text" id="search-input" placeholder="Tìm kiếm khóa học..." 
               class="w-full px-6 py-4 rounded-2xl border-2 border-pink-200 focus:border-primary focus:outline-none text-lg shadow-lg">
      </div>

      <div id="course-list" class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <!-- Card mẫu - bạn có thể copy thêm -->
        <a href="/trangnt/courses/checkout/checkout.html?title=Khóa học VSTEP Reading Online&price=199000" class="group block">
          <div class="relative overflow-hidden rounded-3xl shadow-lg hover:shadow-2xl border border-pink-100 flex flex-col h-full bg-white">
            <div class="absolute top-4 left-4 z-10">
              <span class="bg-danger text-white text-xs font-bold px-3 py-1.5 rounded-full shadow-md animate-pulse">-80%</span>
            </div>
            <div class="absolute top-4 right-4 z-10">
              <span class="bg-white text-primary text-xs font-extrabold px-3 py-1.5 rounded-full shadow-lg border border-primary">HOT</span>
            </div>
            <img src="https://fme.edu.vn/wp-content/uploads/2024/06/khoa-hoc-reading-vstep-fme-768x432.jpg"
                 alt="Khóa học VSTEP Reading Online"
                 class="w-full h-56 object-cover transition-transform duration-700 group-hover:scale-110"
                 loading="lazy">
            <div class="p-6 bg-gradient-to-b from-white to-pink-50 flex flex-col flex-1 justify-between">
              <div>
                <h3 class="text-xl font-black text-gray-800 mb-3 line-clamp-2 group-hover:text-primary transition">Khóa học VSTEP Reading Online</h3>
                <p class="text-gray-600 text-sm mb-4">1 năm • 120+ bài giảng chất lượng cao</p>
              </div>
              <div class="space-y-3">
                <div>
                  <span class="text-gray-400 line-through text-lg">999.000đ</span>
                  <p class="text-3xl font-black text-primary">199.000đ</p>
                </div>
                <button class="w-full py-4 bg-gradient-to-r from-primary to-accent text-white text-lg font-bold rounded-2xl shadow-lg hover:shadow-xl hover:scale-105 transition">
                  Mua ngay
                </button>
              </div>
            </div>
          </div>
        </a>

        <!-- Thêm các card khác tương tự, bỏ class "hidden" nếu muốn hiển thị ngay -->
      </div>

      <div id="empty-state" class="text-center py-32 text-gray-500 hidden">
        <p class="text-3xl mb-6">Không tìm thấy khóa học nào phù hợp 😔</p>
        <a href="index1.html" class="text-primary text-xl underline hover:opacity-80">Quay về trang chủ</a>
      </div>
    </section>
  </main>

  <!-- MODAL KÍCH HOẠT MÃ (giữ nguyên như cũ) -->
  <div id="activate-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black/60">
    <div class="bg-white rounded-2xl p-8 w-full max-w-md shadow-2xl">
      <h2 class="text-2xl font-black mb-4 text-gray-800">Kích hoạt khóa học</h2>
      <input id="activate-code" type="text" placeholder="Nhập mã kích hoạt"
             class="w-full px-4 py-3 border-2 border-pink-200 rounded-xl focus:border-primary focus:outline-none text-lg mb-3">
      <p id="activate-message" class="text-sm mb-4 text-red-500 min-h-[20px]"></p>
      <div class="flex gap-3">
        <button id="activate-submit" class="flex-1 bg-gradient-to-r from-primary to-accent text-white py-3 rounded-xl font-bold hover:opacity-90">
          Kích hoạt
        </button>
        <button id="activate-cancel" class="flex-1 bg-gray-200 text-gray-700 py-3 rounded-xl font-bold hover:bg-gray-300">
          Hủy
        </button>
      </div>
    </div>
  </div>

  <!-- Supabase Client + Auth Logic -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const { createClient } = supabase;

    const SUPABASE_URL = "https://wdpekgcqmwpvbfyonjih.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndkcGVrZ2NxbXdwdmJmeW9uamloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjUzODk4NjUsImV4cCI6MjA4MDk2NTg2NX0.qaIDzIZsGSifXO8PKM2jDAx7E6Earv2K7iFPQ8GqqaU";

    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Hàm cập nhật UI dựa trên trạng thái đăng nhập
    function updateUI(session) {
      const user = session?.user;

      if (user) {
        const name = user.user_metadata?.full_name || user.email.split('@')[0];
        const email = user.email;
        const avatarUrl = user.user_metadata?.avatar_url || user.user_metadata?.picture || 'https://via.placeholder.com/40';

        // Desktop
        document.getElementById('desktop-username').textContent = name;
        document.getElementById('desktop-email').textContent = email;
        document.getElementById('desktop-user-avatar').src = avatarUrl;
        document.getElementById('desktop-user-info').classList.remove('hidden');
        document.getElementById('desktop-login-btn').classList.add('hidden');

        // Mobile
        document.getElementById('mobile-username').textContent = name;
        document.getElementById('mobile-email').textContent = email;
        document.getElementById('mobile-user-avatar').src = avatarUrl;
        document.getElementById('mobile-user-info').classList.remove('hidden');
        document.getElementById('mobile-user-menu').classList.remove('hidden');
        document.getElementById('mobile-login-btn').classList.add('hidden');
      } else {
        // Chưa login
        document.getElementById('desktop-user-info').classList.add('hidden');
        document.getElementById('desktop-login-btn').classList.remove('hidden');

        document.getElementById('mobile-user-info').classList.add('hidden');
        document.getElementById('mobile-user-menu').classList.add('hidden');
        document.getElementById('mobile-login-btn').classList.remove('hidden');
      }
    }

    // Xử lý session khi load trang (quan trọng cho OAuth redirect)
    supabaseClient.auth.getSession().then(({ data: { session } }) => {
      updateUI(session);
    });

    // Lắng nghe thay đổi auth
    supabaseClient.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') {
        updateUI(session);
      } else if (event === 'SIGNED_OUT') {
        updateUI(null);
        // Optional: redirect to login
        // window.location.href = 'login.html';
      }
    });

    // Đăng xuất (desktop & mobile)
    document.getElementById('logout-btn-desktop')?.addEventListener('click', async () => {
      await supabaseClient.auth.signOut();
      location.reload();
    });
    document.getElementById('logout-btn-mobile')?.addEventListener('click', async () => {
      await supabaseClient.auth.signOut();
      location.reload();
    });

    // Dropdown toggle desktop
    document.getElementById('desktop-dropdown-toggle')?.addEventListener('click', () => {
      document.getElementById('desktop-dropdown').classList.toggle('hidden');
    });
  </script>

  <!-- Nếu bạn có file js/app.js riêng thì giữ lại, hiện tại chưa cần -->
  <!-- <script src="js/app.js"></script> -->
</body>
</html>
