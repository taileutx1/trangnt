  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    // Mobile menu toggle
    function toggleMobileMenu() {
      const menu = document.getElementById('mobile-menu');
      const hamburger = document.querySelector('.hamburger');
      menu.classList.toggle('hidden');
      hamburger.classList.toggle('active');
    }

    // Dropdown toggle
    function toggleDropdown(id) {
      document.getElementById(id).classList.toggle('hidden');
    }

    // Giả lập logout
    function logout() {
      localStorage.removeItem('user');
      updateUserUI();
    }

    // Cập nhật giao diện theo trạng thái đăng nhập
    function updateUserUI() {
      const user = localStorage.getItem('user'); // sau này thay bằng Supabase auth

      if (user) {
        // Đã đăng nhập
        document.getElementById('desktop-login-btn').classList.add('hidden');
        document.getElementById('mobile-login-btn').classList.add('hidden');

        document.getElementById('desktop-my-courses-btn').classList.remove('hidden');
        document.getElementById('mobile-my-courses-btn').classList.remove('hidden');

        document.getElementById('desktop-user-menu').classList.remove('hidden');
        document.getElementById('mobile-user-menu').classList.remove('hidden');

        document.getElementById('desktop-username').textContent = 'Nguyễn Văn A'; // thay bằng tên thật
        document.getElementById('mobile-username').textContent = 'Nguyễn Văn A';
      } else {
        // Chưa đăng nhập
        document.getElementById('desktop-login-btn').classList.remove('hidden');
        document.getElementById('mobile-login-btn').classList.remove('hidden');

        document.getElementById('desktop-my-courses-btn').classList.add('hidden');
        document.getElementById('mobile-my-courses-btn').classList.add('hidden');

        document.getElementById('desktop-user-menu').classList.add('hidden');
        document.getElementById('mobile-user-menu').classList.add('hidden');
      }
    }

    // Modal kích hoạt
    function openActivateModal() {
      document.getElementById('activate-modal').classList.add('active');
      document.body.style.overflow = 'hidden';
      document.getElementById('activate-code').focus();
    }
    function closeActivateModal() {
      document.getElementById('activate-modal').classList.remove('active');
      document.body.style.overflow = '';
      document.getElementById('activate-code').value = '';
      document.getElementById('activate-message').textContent = '';
    }
    // Đóng modal khi nhấn ESC hoặc click ngoài
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeActivateModal(); });
    document.getElementById('activate-modal').addEventListener('click', e => {
      if (e.target === document.getElementById('activate-modal')) closeActivateModal();
    });

    // Hàm kích hoạt mã (giả lập)
    function activateCode() {
      const code = document.getElementById('activate-code').value.trim();
      if (code === '') {
        document.getElementById('activate-message').textContent = 'Vui lòng nhập mã kích hoạt!';
      } else {
        document.getElementById('activate-message').textContent = 'Kích hoạt thành công! (giả lập)';
        setTimeout(closeActivateModal, 1500);
      }
    }

    // Tìm kiếm client-side
    function filterCourses() {
      const query = document.getElementById('search-input').value.toLowerCase().trim();
      const cards = document.querySelectorAll('#course-list .course-card');
      let visibleCount = 0;

      cards.forEach(card => {
        const title = card.getAttribute('data-title').toLowerCase();
        if (title.includes(query)) {
          card.style.display = '';
          visibleCount++;
        } else {
          card.style.display = 'none';
        }
      });

      document.getElementById('empty-state').classList.toggle('hidden', visibleCount > 0);
    }

    // Khởi tạo
    updateUserUI();
  </script>
  <!-- MODAL KÍCH HOẠT MÃ -->
<div id="activate-modal"
class="fixed inset-0 z-50 hidden items-center justify-center bg-black/60">

<div class="bg-white rounded-2xl p-8 w-full max-w-md shadow-2xl relative">

<h2 class="text-2xl font-black mb-4 text-gray-800">
 Kích hoạt khóa học

<input id="activate-code"

<p id="activate-message" class="text-sm mb-4 text-red-500"></p>

<div class="flex gap-3">
 <button onclick="activateCode()"

   Kích hoạt
 </button>

 <button onclick="closeActivateModal()"
         class="flex-1 bg-gray-200 text-gray-700 py-3 rounded-xl font-bold hover:bg-gray-300">
   Hủy
 </button>
</div>

</div>

<script>
function openActivateModal() {
  const modal = document.getElementById('activate-modal');
  modal.classList.remove('hidden');
  modal.classList.add('flex');
  document.body.style.overflow = 'hidden';
}

function closeActivateModal() {
  const modal = document.getElementById('activate-modal');
  modal.classList.add('hidden');
  modal.classList.remove('flex');
  document.body.style.overflow = '';
  document.getElementById('activate-code').value = '';
  document.getElementById('activate-message').textContent = '';
}

/* Đóng khi click ra ngoài */
document.getElementById('activate-modal').addEventListener('click', e => {
  if (e.target.id === 'activate-modal') {
    closeActivateModal();
  }
});

/* Đóng khi bấm ESC */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeActivateModal();
});
</script>
<script>
  async function loadUserInfo() {
    const { data } = await supabase.auth.getUser();
    const user = data.user;
  
    if (!user) return;
  
    // Lấy tên + avatar Google
    const name =
      user.user_metadata?.full_name ||
      user.user_metadata?.name ||
      user.email;
  
    const avatar =
      user.user_metadata?.avatar_url ||
      "https://ui-avatars.com/api/?name=" + encodeURIComponent(name);
  
    document.getElementById("user-name").textContent = name;
    document.getElementById("user-avatar").src = avatar;
  }
  
  // Logout
  document.getElementById("logoutBtn").onclick = async () => {
    await supabase.auth.signOut();
    window.location.href = "/login.html";
  };
  
  loadUserInfo();
  </script>
